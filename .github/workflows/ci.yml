name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Go server (fmt, vet, build, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: arena/server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: arena/server/go.sum

      - name: Check formatting (gofmt)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v

  web:
    name: Web frontend (typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: arena/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: arena/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and build
        run: npm run build

  match-sandbox-image:
    name: Match sandbox Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build filler-arena-match image
        run: docker build -f arena/sandbox/Dockerfile.match -t filler-arena-match arena/sandbox
